name: cortana-mcp

services:
  notion-mcp:
    image: mcp/notion
    environment:
      - NOTION_TOKEN=${NOTION_TOKEN}
    command: ["--transport", "http", "--port", "3000", "--auth-token", "${NOTION_MCP_AUTH_TOKEN}"]
    restart: unless-stopped
    networks:
      - cortana-net
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://localhost:3000/health',r=>process.exit(r.statusCode===200?0:1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  google-workspace-mcp:
    image: ghcr.io/taylorwilsdon/google_workspace_mcp:latest
    environment:
      - GOOGLE_OAUTH_CLIENT_ID=${GOOGLE_OAUTH_CLIENT_ID}
      - GOOGLE_OAUTH_CLIENT_SECRET=${GOOGLE_OAUTH_CLIENT_SECRET}
      - TRANSPORT=http
      - PORT=3005
      - AUTH_TOKEN=${GOOGLE_MCP_AUTH_TOKEN}
    volumes:
      - ./data/gworkspace-creds:/home/app/.google_workspace_mcp/credentials
    ports:
      - "3005:3005"
    restart: unless-stopped
    networks:
      - cortana-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

networks:
  cortana-net:
    external: true
